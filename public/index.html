<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Too Much News!!</title>
    <meta name="description" content="finally become up to date with whats happening in the world!">
    <meta property="og:title" content="Too Much News!!">
    <meta property="og:description" content="finally become up to date with whats happening in the world!">
    <meta property="og:type" content="website">
    <meta property="og:image" content="/og-image">
    <meta property="og:image:alt" content="You missed headlines in the last minute">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Too Much News!!">
    <meta name="twitter:description" content="finally become up to date with whats happening in the world!">
    <meta name="twitter:image" content="/og-image">
    <link rel="icon" id="favicon-dynamic" href="/favicon-newspaper.svg" type="image/svg+xml">
    <link rel="shortcut icon" href="/favicon-fallback.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js" defer></script>
</head>
<body>
    <div id="container">
        <div id="header">
            <div id="left-controls">
                <button id="pause-toggle" type="button">PAUSE</button>
            </div>
            <div id="status">SIGNAL: <span id="signal-strength">Newest: --</span></div>
            <div id="title-wrapper"><h1>TOO MUCH NEWS!!</h1></div>
            <div id="right-controls">
                <div id="queue-status">BUFFER: <span id="queue-count">0</span></div>
                <div id="about-link"><a href="about.html">ABOUT</a></div>
            </div>
        </div>
        <div id="stream"></div>
    </div>
    <div id="help-modal" aria-hidden="true">
        <div id="help-panel">
            <h2>Keyboard Commands</h2>
            <p><strong>Space</strong> - Pause/Resume rendering</p>
            <p><strong>Up / k</strong> - Focus previous article</p>
            <p><strong>Down / j</strong> - Focus next article</p>
            <p><strong>Enter</strong> - Open focused article</p>
            <p><strong>?</strong> - Toggle this help panel</p>
            <p><strong>Esc</strong> - Close help panel</p>
        </div>
    </div>
    <div id="ticker">
        <div id="ticker-content"></div>
    </div>
</body>
</html>
