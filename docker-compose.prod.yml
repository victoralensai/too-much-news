services:
  too-much-news:
    image: ghcr.io/victoralensai/too-much-news:latest
    container_name: too-much-news
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - PORT=3000
      - ARCHIVE_FILE_PATH=/app/data/archive.json
    volumes:
      - too-much-news-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/health', r => process.exit(r.statusCode===200?0:1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  too-much-news-data:
